<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Products — On Your Door</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .admin-wrap{max-width:800px; margin:0 auto; padding:40px 24px 80px;}
  .admin-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:28px;}
  .admin-form{
    background:var(--paper); border:1px solid var(--line); border-radius:18px;
    padding:26px; display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:36px;
  }
  .admin-form label{font-size:0.8rem; font-weight:600; color:var(--muted); display:block; margin-bottom:5px;}
  .admin-form input, .admin-form select, .admin-form textarea{
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--line);
    font-family:inherit; font-size:0.9rem;
  }
  .admin-form textarea{resize:vertical; min-height:60px;}
  .full-row{grid-column:1/-1;}
  .admin-table{width:100%; border-collapse:collapse; background:var(--paper); border-radius:14px; overflow:hidden;}
  .admin-table th, .admin-table td{text-align:left; padding:12px 14px; border-bottom:1px solid var(--line); font-size:0.85rem;}
  .admin-table th{background:var(--orange-soft); font-weight:700; color:var(--orange-dark);}
  .row-actions button{
    border:none; background:none; font-weight:600; cursor:pointer; font-size:0.8rem; margin-right:10px;
  }
  .row-actions .del{color:#C6540C;}
  .lock-screen{
    max-width:360px; margin:100px auto; text-align:center; background:var(--paper);
    border:1px solid var(--line); border-radius:18px; padding:36px 28px;
  }
  .lock-screen input{width:100%; padding:12px; border-radius:10px; border:1px solid var(--line); margin:16px 0; text-align:center;}
  .note{font-size:0.78rem; color:var(--muted); margin-top:10px;}
</style>
</head>
<body>

<header class="site-header">
  <div class="wrap header-inner">
    <a href="index.html" class="brand">
      <img src="images/logo.jpg" alt="On Your Door logo" class="brand-logo">
      <div class="brand-text">
        <span class="brand-name">On Your Door</span>
        <span class="brand-tag">Admin panel</span>
      </div>
    </a>
    <a href="index.html" class="btn btn-primary" style="padding:10px 20px;">← Back to store</a>
  </div>
</header>

<div id="lockScreen" class="lock-screen">
  <h2>Admin access</h2>
  <p style="color:var(--muted); font-size:0.9rem;">Enter the store passcode to manage products.</p>
  <input type="password" id="passInput" placeholder="Passcode">
  <button class="btn btn-primary" id="unlockBtn" style="width:100%; justify-content:center;">Unlock</button>
  <p class="note">Default passcode: <strong>onyourdoor786</strong> — change it in admin.html (search for ADMIN_PASSCODE).</p>
</div>

<div class="admin-wrap" id="adminPanel" style="display:none;">
  <div class="admin-head">
    <h1 style="font-family:var(--font-display); font-size:1.6rem;">Manage products</h1>
  </div>

  <form class="admin-form" id="productForm">
    <input type="hidden" id="editId">
    <div>
      <label>Product name</label>
      <input type="text" id="fName" required placeholder="e.g. Men's Leather Wallet">
    </div>
    <div>
      <label>Category</label>
      <input type="text" id="fCategory" required placeholder="e.g. Bags & Luggage">
    </div>
    <div>
      <label>Price (Rs)</label>
      <input type="number" id="fPrice" required placeholder="2500">
    </div>
    <div>
      <label>Old price (optional, for discount)</label>
      <input type="number" id="fOldPrice" placeholder="3000">
    </div>
    <div>
      <label>Badge (optional)</label>
      <input type="text" id="fBadge" placeholder="New / Best Seller / Sale">
    </div>
    <div>
      <label>Image URL (optional — leave blank to use an icon)</label>
      <input type="text" id="fImg" placeholder="https://...">
    </div>
    <div class="full-row">
      <label>Description</label>
      <textarea id="fDesc" placeholder="Short product description for customers"></textarea>
    </div>
    <div class="full-row" style="display:flex; gap:10px;">
      <button type="submit" class="btn btn-primary">Save product</button>
      <button type="button" class="btn" id="resetForm" style="background:var(--line);">Clear form</button>
    </div>
  </form>

  <table class="admin-table">
    <thead>
      <tr><th>Name</th><th>Category</th><th>Price</th><th></th></tr>
    </thead>
    <tbody id="productRows"></tbody>
  </table>
</div>

<script>
const ADMIN_PASSCODE = "onyourdoor786"; // change this to something only you know

function loadProducts(){
  const raw = localStorage.getItem("oyd_products");
  return raw ? JSON.parse(raw) : [];
}
function saveProducts(list){
  localStorage.setItem("oyd_products", JSON.stringify(list));
}

let products = loadProducts();

function money(n){ return "Rs " + Number(n).toLocaleString("en-PK"); }

function renderRows(){
  const body = document.getElementById("productRows");
  body.innerHTML = products.map(p => `
    <tr>
      <td>${p.name}</td>
      <td>${p.category}</td>
      <td>${money(p.price)}</td>
      <td class="row-actions">
        <button data-edit="${p.id}">Edit</button>
        <button class="del" data-del="${p.id}">Delete</button>
      </td>
    </tr>
  `).join("");
  body.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",()=>editProduct(b.dataset.edit)));
  body.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>deleteProduct(b.dataset.del)));
}

function editProduct(id){
  const p = products.find(x => x.id === id);
  if(!p) return;
  document.getElementById("editId").value = p.id;
  document.getElementById("fName").value = p.name;
  document.getElementById("fCategory").value = p.category;
  document.getElementById("fPrice").value = p.price;
  document.getElementById("fOldPrice").value = p.oldPrice || "";
  document.getElementById("fBadge").value = p.badge || "";
  document.getElementById("fImg").value = p.img || "";
  document.getElementById("fDesc").value = p.desc || "";
  window.scrollTo({top:0, behavior:"smooth"});
}
function deleteProduct(id){
  if(!confirm("Remove this product from the store?")) return;
  products = products.filter(p => p.id !== id);
  saveProducts(products);
  renderRows();
}

document.getElementById("productForm").addEventListener("submit", (e) => {
  e.preventDefault();
  const id = document.getElementById("editId").value || "p" + Date.now();
  const data = {
    id,
    name: document.getElementById("fName").value.trim(),
    category: document.getElementById("fCategory").value.trim(),
    price: Number(document.getElementById("fPrice").value),
    oldPrice: document.getElementById("fOldPrice").value ? Number(document.getElementById("fOldPrice").value) : null,
    badge: document.getElementById("fBadge").value.trim(),
    img: document.getElementById("fImg").value.trim(),
    icon: "🛍️",
    desc: document.getElementById("fDesc").value.trim()
  };
  const idx = products.findIndex(p => p.id === id);
  if(idx > -1) products[idx] = data; else products.push(data);
  saveProducts(products);
  renderRows();
  e.target.reset();
  document.getElementById("editId").value = "";
});

document.getElementById("resetForm").addEventListener("click", () => {
  document.getElementById("productForm").reset();
  document.getElementById("editId").value = "";
});

document.getElementById("unlockBtn").addEventListener("click", unlock);
document.getElementById("passInput").addEventListener("keydown", (e) => { if(e.key === "Enter") unlock(); });
function unlock(){
  if(document.getElementById("passInput").value === ADMIN_PASSCODE){
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    renderRows();
  }else{
    alert("Galat passcode, dobara koshish karein.");
  }
}
</script>
</body>
</html>
